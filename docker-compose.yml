version: "3.9"

services:
  db:
    image: postgres:17
    container_name: khiembuiblog-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: khiembuiblog-backend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    depends_on:
      db:
        condition: service_healthy

    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./ClientApp
      dockerfile: Dockerfile.dev

    container_name: khiembuiblog-frontend
    restart: unless-stopped

    ports:
      - "4200:80"

    volumes:
      - ./ClientApp:/app
      - /app/node_modules

    depends_on:
      - backend

    command: npm start -- --host 0.0.0.0

volumes:
  postgres_data: